<!DOCTYPE html>

<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>Галерея</title>
  <script src="./Галерея_files/exif.min.js.загрузка"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .viewer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    #mainImage {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: opacity 0.4s ease;
      opacity: 0;
      z-index: 1;
      pointer-events: none;
    }

    #mainImage.loaded {
      opacity: 1;
    }

    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      background: rgba(20, 20, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      line-height: 1;
      padding-bottom: 2px;
    }

    .nav-btn:hover {
      background: rgba(50, 50, 70, 0.8);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-50%) scale(1.05);
    }

    #prevBtn { left: 16px; }
    #nextBtn { right: 16px; }

    /* ----- обновлённая панель ----- */
    .info-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 30;
      width: 300px;                   /* уже, чем было */
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      background: rgba(12, 12, 18, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      color: #eee;
      transform: translateX(0);
      opacity: 1;
      visibility: visible;
    }

    .info-panel.collapsed {
      transform: translateX(calc(100% + 40px));
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .panel-header {
      padding: 10px 14px 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .panel-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header-left .toggle-meta-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .panel-header-left .toggle-meta-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .close-panel-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .close-panel-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .panel-content {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* колонка информации теперь слева */
    .meta-column {
      flex: 1;
      padding: 10px 12px;
      overflow-y: auto;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.3s ease;
      min-width: 0;
    }

    /* скрытие информации */
    .meta-column.hidden {
      flex: 0 0 0;
      width: 0;
      padding: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      margin: 0;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px dashed rgba(255,255,255,0.08);
      padding-bottom: 3px;
    }

    .meta-label {
      color: #aaa;
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .meta-value {
      color: #f0f0f0;
      text-align: right;
      word-break: break-word;
      font-size: 12px;
    }

    .no-exif {
      color: #666;
      font-style: italic;
      text-align: center;
      margin-top: 20px;
    }

    /* миниатюры теперь справа */
    .thumb-list {
      width: 80px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.3) transparent;
      border-left: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
      transition: width 0.3s;
    }

    /* когда информация скрыта, миниатюры могут занять всю ширину */
    /* .meta-column.hidden + .thumb-list {
      width: 100%;
      border-left: none;
    } */

    .thumb-item {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
      background: #1a1a1a;
      margin: 0 auto;
    }

    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-item.active {
      border-color: #ffb347;
      box-shadow: 0 0 10px rgba(255, 179, 71, 0.45);
    }

    .show-panel-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 31;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(18, 18, 24, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: 0.2s;
    }

    .show-panel-btn.visible {
      display: flex;
    }

    .context-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      pointer-events: none;
      background: rgba(0,0,0,0.5);
      padding: 6px 18px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    .context-hint.hidden {
      opacity: 0;
      visibility: hidden;
    }

    @media (max-width: 768px) {
      .info-panel {
        top: auto;
        bottom: 16px;
        right: 16px;
        width: calc(100vw - 32px);
        max-height: 45vh;
        border-radius: 28px 28px 20px 20px;
        flex-direction: column-reverse;
      }

      .panel-content {
        flex-direction: column-reverse;
      }

      .thumb-list {
        flex-direction: row;
        width: 100%;
        height: 80px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px 6px;
        gap: 8px;
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.08);
      }

      .meta-column.hidden + .thumb-list {
        height: 80px;  /* сохраняем высоту на мобильных */
      }

      .thumb-item {
        width: 60px;
        height: 60px;
      }

      .meta-column {
        max-height: 160px;
        min-height: 100px;
      }

      .nav-btn {
        width: 40px;
        height: 40px;
        font-size: 26px;
      }

      #prevBtn { left: 8px; }
      #nextBtn { right: 8px; }

      .info-panel.collapsed {
        transform: translateY(calc(100% + 40px));
      }
    }
  </style>
</head>

      <div class="thumb-list" id="thumbList"><div class="thumb-item"><img src="blob:https://photo.romq.ru/cd3c6c2a-5b03-4c36-8063-ac7bf7a2ab72" alt="IMG_2336-2.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/fca1a77d-e477-4b00-ac1c-0931f87f8450" alt="IMG_2372.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/bbe6b7a2-ec6c-4d0b-819b-8eab5a2904e2" alt="IMG_2376.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/344c055b-fc6d-4805-8562-ea713e7d679e" alt="IMG_2382.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/990db11f-6044-4d7c-a48b-acc0b821ecb6" alt="IMG_2389.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/2c442c28-e8f8-4608-8f60-9b223a9e6797" alt="IMG_2396.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/78da7f2a-988c-4286-8218-9aa22d351564" alt="IMG_2397.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/b6b50891-5943-4189-a925-4f69f4bceac5" alt="IMG_2405.png" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/d9dc6a0a-c9af-45e8-bc42-86aabc22a4d9" alt="IMG_2410.png" loading="lazy" decoding="async"></div><div class="thumb-item active"><img src="blob:https://photo.romq.ru/2b74f10c-e390-4f13-9354-a2977065a05c" alt="IMG_2502png.PNG" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/dcd9cb56-087c-4224-b344-04f73257593f" alt="IMG_2503png.PNG" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/6a413734-14d4-44f7-8154-62ae9161887f" alt="IMG_2533png.PNG" loading="lazy" decoding="async"></div><div class="thumb-item"><img src="blob:https://photo.romq.ru/51e8     </div>
  </div>

  <div class="context-hint hidden" id="contextHint">ПКМ для выбора папки • Перетащите файлы</div>

  <script>
  (function() {
    const PHOTO_DIR = './images/';
    const FILE_LIST = [
      'IMG_2336-2.png',
      'IMG_2372.png',
      'IMG_2376.png',
      'IMG_2382.png',
      'IMG_2389.png',
      'IMG_2396.png',
      'IMG_2397.png',
      'IMG_2405.png',
      'IMG_2410.png',
      'IMG_2502png.PNG',
      'IMG_2503png.PNG',
      'IMG_2533png.PNG',
      'IMG_2534png.PNG',
      'IMG_2536png.PNG',
      'IMG_2537png.PNG',
      'IMG_2540png.PNG',
      'IMG_2548png.PNG',
      'IMG_2549png_1.PNG',
      'IMG_2663jpg.JPG',
      'IMG_2743jpg.JPG'
    ];

    const mainImage = document.getElementById('mainImage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const thumbList = document.getElementById('thumbList');
    const metaContent = document.getElementById('metaContent');
    const imageCounter = document.getElementById('imageCounter');
    const infoPanel = document.getElementById('infoPanel');
    const closePanelBtn = document.getElementById('closePanelBtn');
    const showPanelBtn = document.getElementById('showPanelBtn');
    const folderInput = document.getElementById('folderInput');
    const contextHint = document.getElementById('contextHint');
    const toggleMetaBtn = document.getElementById('toggleMetaBtn');

    let images = [];
    let currentIndex = -1;

    // --- подсказка ---
    let hintHidden = false;
    let hintTimer = null;

    function hideHint() {
      if (!hintHidden) {
        contextHint.classList.add('hidden');
        hintHidden = true;
      }
    }

    function showHintTemporarily() {
      if (hintHidden) {
        contextHint.classList.remove('hidden');
        hintHidden = false;
      }
      clearTimeout(hintTimer);
      hintTimer = setTimeout(() => {
        contextHint.classList.add('hidden');
        hintHidden = true;
      }, 2000);
    }

    document.addEventListener('mousemove', (e) => {
      if (e.clientY > window.innerHeight * 0.85) {
        showHintTemporarily();
      } else {
        if (!hintHidden) {
          hintTimer = setTimeout(() => {
            contextHint.classList.add('hidden');
            hintHidden = true;
          }, 1500);
        }
      }
    });

    function onUserNavigation() {
      hideHint();
    }

    // --- панель ---
    function collapsePanel() {
      infoPanel.classList.add('collapsed');
      showPanelBtn.classList.add('visible');
    }

    function expandPanel() {
      infoPanel.classList.remove('collapsed');
      showPanelBtn.classList.remove('visible');
    }

    closePanelBtn.addEventListener('click', collapsePanel);
    showPanelBtn.addEventListener('click', expandPanel);

    toggleMetaBtn.addEventListener('click', () => {
      metaContent.classList.toggle('hidden');
    });

    // --- миниатюры ---
    async function createThumbnail(source) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = source instanceof File ? URL.createObjectURL(source) : source;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const size = 72;
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const ratio = Math.min(size / img.width, size / img.height);
          const w = img.width * ratio;
          const h = img.height * ratio;
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(0, 0, size, size);
          ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
          canvas.toBlob((blob) => {
            resolve(URL.createObjectURL(blob));
          }, 'image/jpeg', 0.7);
        };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    async function loadFromConstantList() {
      const loaded = [];
      for (const name of FILE_LIST) {
        const url = PHOTO_DIR + name;
        let exif = null;
        let width = null;
        let height = null;
        let size = null;
        let blobUrl = null;
        let file = null;

        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Not found');
          const blob = await response.blob();
          size = blob.size;
          file = new File([blob], name, { type: blob.type || 'image/jpeg' });
          blobUrl = URL.createObjectURL(file);
        } catch (e) {
          console.warn(`fetch не удался для ${url}, пробуем Image (возможно, локально)`, e);
        }

        if (!file) {
          try {
            await new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => {
                width = img.naturalWidth;
                height = img.naturalHeight;
                blobUrl = url; 
                resolve();
              };
              img.onerror = reject;
              img.src = url;
            });
          } catch (imgErr) {
            console.warn(`Файл ${url} не загрузился и через Image`, imgErr);
            continue;
          }
        }

        const exifImg = new Image();
        exifImg.src = blobUrl;
        await new Promise((resolve) => {
          exifImg.onload = () => {
            if (window.EXIF) {
              EXIF.getData(exifImg, function() {
                exif = EXIF.getAllTags(exifImg);
                resolve();
              });
            } else {
              resolve();
            }
          };
          exifImg.onerror = resolve;
        });

        if (!width) width = exifImg.naturalWidth;
        if (!height) height = exifImg.naturalHeight;

        const thumbUrl = await createThumbnail(file || blobUrl);

        loaded.push({
          name,
          width,
          height,
          size,          
          exif,
          url: blobUrl,   
          thumbUrl
        });
      }

      if (loaded.length > 0) {
        images = loaded;
        currentIndex = 0;
        showImage(0);
        renderThumbnails();
      } else {
        metaContent.innerHTML = '<div class="no-exif">Нет изображений. Проверьте папку и имена файлов.</div>';
      }
    }

    async function handleFiles(fileList) {
      resetGallery();
      const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
      if (files.length === 0) {
        metaContent.innerHTML = '<div class="no-exif">Нет изображений</div>';
        return;
      }
      files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

      images = await Promise.all(files.map(async (file) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.src = url;
        await new Promise(resolve => img.onload = resolve);
        const thumbUrl = await createThumbnail(file);
        return {
          name: file.name,
          width: img.naturalWidth,
          height: img.naturalHeight,
          size: file.size,
          exif: null,
          url,
          thumbUrl
        };
      }));

      images.forEach((imgData) => {
        const img = new Image();
        img.src = imgData.url;
        if (window.EXIF) {
          EXIF.getData(img, function() {
            imgData.exif = EXIF.getAllTags(img);
            if (currentIndex >= 0) updateMetaDisplay();
          });
        }
      });

      if (images.length > 0) {
        currentIndex = 0;
        showImage(0);
        renderThumbnails();
      }
    }

    function resetGallery() {
      images.forEach(img => {
        if (img.url && img.url.startsWith('blob:')) URL.revokeObjectURL(img.url);
        if (img.thumbUrl && img.thumbUrl.startsWith('blob:')) URL.revokeObjectURL(img.thumbUrl);
      });
      images = [];
      currentIndex = -1;
      mainImage.src = '';
      mainImage.classList.add('loaded');
      renderThumbnails();
      updateMetaDisplay();
      imageCounter.textContent = '0 / 0';
    }

    function showImage(index) {
      if (index < 0 || index >= images.length) return;
      currentIndex = index;
      const imgData = images[index];
      mainImage.classList.remove('loaded');
      mainImage.src = imgData.url;
      const temp = new Image();
      temp.onload = () => mainImage.classList.add('loaded');
      temp.src = imgData.url;
      setTimeout(() => {
        if (mainImage.complete && mainImage.naturalWidth > 0) mainImage.classList.add('loaded');
      }, 50);

      updateMetaDisplay();
      updateThumbActive();
      imageCounter.textContent = `${index+1} / ${images.length}`;
      const items = document.querySelectorAll('.thumb-item');
      if (items[index]) items[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
      onUserNavigation();
    }

    function renderThumbnails() {
      thumbList.innerHTML = '';
      images.forEach((img, idx) => {
        const div = document.createElement('div');
        div.className = 'thumb-item' + (idx === currentIndex ? ' active' : '');
        const thumb = document.createElement('img');
        thumb.src = img.thumbUrl || img.url;
        thumb.alt = img.name;
        thumb.loading = 'lazy';
        thumb.decoding = 'async';
        div.appendChild(thumb);
        div.addEventListener('click', () => showImage(idx));
        thumbList.appendChild(div);
      });
    }

    function updateThumbActive() {
      document.querySelectorAll('.thumb-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
    }

    function updateMetaDisplay() {
      if (currentIndex < 0 || images.length === 0) {
        metaContent.innerHTML = '<div class="no-exif">Нет данных</div>';
        return;
      }
      const d = images[currentIndex];
      const exif = d.exif;
      const fmtSize = (b) => {
        if (b == null) return '—';
        return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
      };
      let html = '';
      html += `<div class="meta-row"><span class="meta-label">Имя</span><span class="meta-value">${d.name}</span></div>`;
      html += `<div class="meta-row"><span class="meta-label">Размер</span><span class="meta-value">${fmtSize(d.size)}</span></div>`;
      if (d.width && d.height) html += `<div class="meta-row"><span class="meta-label">Разрешение</span><span class="meta-value">${d.width}×${d.height}</span></div>`;
      if (exif) {
        if (exif.DateTime || exif.DateTimeOriginal) html += `<div class="meta-row"><span class="meta-label">Дата</span><span class="meta-value">${exif.DateTime || exif.DateTimeOriginal}</span></div>`;
        if (exif.Make || exif.Model) html += `<div class="meta-row"><span class="meta-label">Камера</span><span class="meta-value">${[exif.Make, exif.Model].filter(Boolean).join(' ')}</span></div>`;
        if (exif.FocalLength) html += `<div class="meta-row"><span class="meta-label">Фокусное</span><span class="meta-value">${exif.FocalLength} мм</span></div>`;
        if (exif.FNumber) html += `<div class="meta-row"><span class="meta-label">Диафрагма</span><span class="meta-value">f/${exif.FNumber}</span></div>`;
        if (exif.ExposureTime) html += `<div class="meta-row"><span class="meta-label">Выдержка</span><span class="meta-value">${exif.ExposureTime} с</span></div>`;
        if (exif.ISOSpeedRatings) html += `<div class="meta-row"><span class="meta-label">ISO</span><span class="meta-value">${exif.ISOSpeedRatings}</span></div>`;
      } else {
        html += '<div class="meta-row"><span class="meta-label">EXIF</span><span class="meta-value" style="color:#888">недоступен</span></div>';
      }
      metaContent.innerHTML = html;
    }

    function nextImage() { if (images.length) showImage((currentIndex+1)%images.length); }
    function prevImage() { if (images.length) showImage((currentIndex-1+images.length)%images.length); }

    prevBtn.addEventListener('click', prevImage);
    nextBtn.addEventListener('click', nextImage);
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); prevImage(); }
      if (e.key === 'ArrowRight') { e.preventDefault(); nextImage(); }
    });

    let touchStartX = 0;
    document.querySelector('.viewer').addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});
    document.querySelector('.viewer').addEventListener('touchend', e => {
      const delta = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(delta) > 50) { delta > 0 ? prevImage() : nextImage(); }
    });

    document.addEventListener('contextmenu', e => {
      e.preventDefault();
      folderInput.click();
    });
    folderInput.addEventListener('change', e => {
      if (e.target.files.length) handleFiles(e.target.files);
    });

    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });

    loadFromConstantList();
  })();
</script>

</body></html>
